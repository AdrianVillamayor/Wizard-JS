<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wizard TS Browser Test</title>
    <link rel="stylesheet" href="../base.css">
</head>
<body>
    <main class="test-shell">
        <header class="test-header">
            <h1>TypeScript Browser Smoke Test</h1>
            <p>Consuming the published package from a TypeScript entry with package CSS.</p>
        </header>
        <div class="wizard">
            <aside class="wizard-content">
                <div class="wizard-step" data-wz-title="Profile">
                    <label for="ts-name">Name</label>
                    <input id="ts-name" type="text" class="required" placeholder="Name">
                </div>
                <div class="wizard-step" data-wz-title="Contact">
                    <label for="ts-email">Email</label>
                    <input id="ts-email" type="email" class="required" placeholder="Email">
                </div>
            </aside>
        </div>
        <p id="status">Loading TypeScript browser test...</p>
    </main>
    <script type="module" src="./main.ts"></script>
</body>
</html>
